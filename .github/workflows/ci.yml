name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v3
        with:
          php-version: 8.3
          extensions: mbstring, xml, curl, pdo, pdo_sqlite, sqlite, pdo_pgsql, pgsql
          coverage: none

      - name: Install composer dependencies
        run: composer install --no-progress --no-suggest --prefer-dist

      - name: Prepare .env
        run: |
          cp .env.example .env
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate --ansi
          # Use in-memory sqlite for CI to keep tests fast and isolated
          php -r "file_put_contents('.env', str_replace(['DB_CONNECTION=mysql','DB_DATABASE=laravel'], ['DB_CONNECTION=sqlite','DB_DATABASE=:memory:'], file_get_contents('.env')));"

      - name: Run migrations (sqlite)
        run: |
          php artisan migrate --force || true

      - name: Run tests
        run: vendor/bin/phpunit --colors=always
